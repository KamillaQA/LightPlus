name: Pedido Catalogo API Tests

on:
  push:
    branches: [ main ]

jobs:

  smoke:
    runs-on: ubuntu-latest
    env:
      VUSUARIO: ${{ secrets.VUSUARIO }}
      VSENHA: ${{ secrets.VSENHA }}
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g newman
      - run: |
          newman run api-v1.0.postman_collection.json \
          -e HOM.postman_environment.json \
          --env-var vUsuario=$VUSUARIO \
          --env-var vSenha=$VSENHA \
          --folder "02-PEDIDO_CATALOGO" \
          --folder "SMOKE" \
          --reporters cli

  validation:
    runs-on: ubuntu-latest
    needs: smoke
    env:
      VUSUARIO: ${{ secrets.VUSUARIO }}
      VSENHA: ${{ secrets.VSENHA }}
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g newman
      - run: |
          newman run api-v1.0.postman_collection.json \
          -e HOM.postman_environment.json \
          --env-var vUsuario=$VUSUARIO \
          --env-var vSenha=$VSENHA \
          --folder "02-PEDIDO_CATALOGO" \
          --folder "VALIDATION" \
          --reporters cli

  business:
    runs-on: ubuntu-latest
    needs: validation
    env:
      VUSUARIO: ${{ secrets.VUSUARIO }}
      VSENHA: ${{ secrets.VSENHA }}
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g newman
      - run: |
          newman run api-v1.0.postman_collection.json \
          -e HOM.postman_environment.json \
          --env-var vUsuario=$VUSUARIO \
          --env-var vSenha=$VSENHA \
          --folder "02-PEDIDO_CATALOGO" \
          --folder "BUSINESS_RULE" \
          --reporters cli

  alteracao:
    runs-on: ubuntu-latest
    needs: business
    env:
      VUSUARIO: ${{ secrets.VUSUARIO }}
      VSENHA: ${{ secrets.VSENHA }}
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g newman
      - run: |
          newman run api-v1.0.postman_collection.json \
          -e HOM.postman_environment.json \
          --env-var vUsuario=$VUSUARIO \
          --env-var vSenha=$VSENHA \
          --folder "02-PEDIDO_CATALOGO" \
          --folder "ALTERACAO" \
          --reporters cli

  dashboard:
    runs-on: ubuntu-latest
    needs: [smoke, validation, business, alteracao]
    if: always()
    permissions:
      contents: write

    env:
      VUSUARIO: ${{ secrets.VUSUARIO }}
      VSENHA: ${{ secrets.VSENHA }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - run: |
          npm install -g newman
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Rodar testes consolidados
        run: |
          newman run api-v1.0.postman_collection.json \
          -e HOM.postman_environment.json \
          --env-var vUsuario=$VUSUARIO \
          --env-var vSenha=$VSENHA \
          --folder "02-PEDIDO_CATALOGO" \
          --reporters cli,json \
          --reporter-json-export report.json
        continue-on-error: true

      - name: Extrair métricas
        run: |
          TOTAL=$(jq '.run.stats.assertions.total' report.json)
          FAILED=$(jq '.run.stats.assertions.failed' report.json)
          PASSED=$(jq '.run.stats.assertions.total - .run.stats.assertions.failed' report.json)
          SUCCESS=$(awk "BEGIN {printf \"%.2f\", ($PASSED/$TOTAL)*100}")

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "SUCCESS=$SUCCESS" >> $GITHUB_ENV

      - name: Criar estrutura
        run: mkdir -p public

      - name: Criar index.html
        run: |
          cat <<EOF > public/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Pedido Catálogo - Dashboard</title>
            <style>
              body { background:#0f172a; color:#e2e8f0; font-family:Arial; padding:40px }
              h1 { margin-bottom:20px }
              .card {
                background:#1e293b;
                padding:20px;
                border-radius:10px;
                margin-bottom:20px;
              }
              .success { color:#22c55e }
              .fail { color:#ef4444 }
            </style>
          </head>
          <body>
            <h1>Pedido Catálogo - Histórico</h1>
            <div class="card">
              <strong>Última atualização:</strong> $(date)<br><br>
              <strong>Total:</strong> $TOTAL |
              <span class="success"><strong>Passed:</strong> $PASSED</span> |
              <span class="fail"><strong>Failed:</strong> $FAILED</span> |
              <strong>Success:</strong> $SUCCESS%
            </div>
          </body>
          </html>
          EOF

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages